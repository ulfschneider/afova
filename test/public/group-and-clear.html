<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <title>
        Test Group And Clear
    </title>
    <script defer src="/js/afova.js"></script>
    <script>
        addEventListener('DOMContentLoaded', () => afova.init());
    </script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<style></style>

<body>
    <a href="/">Home</a>
    <h1>Test Group And Clear
    </h1>
    <form>
        <input type="submit" value="Submit the form" />
        <input type="reset" value="Reset the form" />

        <label>A reqired text input
            <input id="required-text-input" type="text" required>
        </label>

        <div class="afova-group">
            <label>A reqired text input with an enclosing afova-group
                <input id="required-text-input-grouped" type="text" required>
            </label>
        </div>

    </form>
</body>

</html>
