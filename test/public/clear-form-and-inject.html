<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <title>
      Test Clear Form And Inject
    </title>
    <script defer src="/js/afova.js"></script>
    <script>
      addEventListener('DOMContentLoaded', () => afova.init());

      counter = 1;
      customCounter = 1;
      function injectMessages() {
        afova.injectMessage('#required-text-input', `${
          counter ++
        } This is an injected message`);
        afova.injectMessage('#required-text-input-custom', `${
          customCounter ++
        } This is an injected message`);
      }
    </script>
    <link rel="stylesheet" href="/css/main.css">
  </head>
  <style></style>

  <body>
    <a href="/">Home</a>
    <h1>Test Clear Form And Inject
    </h1>

    <div>
      <input value="Inject Messages" type="button" onclick="injectMessages();">
    </div>
    <div>
      <input value="Clear Injected Messages for #required-text-input" type="button" onclick="afova.clearMessage('#required-text-input'); counter=1;">
      <input value="Clear Injected Messages for #required-text-input-custom" type="button" onclick="afova.clearMessage('#required-text-input-custom'); customCounter=1;">
      <input value="Clear All Injected Messages" type="button" onclick="afova.clearMessage('#required-text-input', '#required-text-input-custom'); counter=1; customCounter=1;">
    </div>
    <div>
      <input value="Clear Form" id="clear-form" type="button" onclick="afova.clearForm('#form'); counter=1; customCounter=1;">
    </div>
    <form id="form">
      <input type="submit" value="Submit the form"/>
      <input type="reset" onclick="counter=1; customCounter=1;" ;value="Reset the form"/>

      <label>A reqired text input
        <input id="required-text-input" type="text" required>
      </label>

      <label>A reqired text input with custom failure message
        <input id="required-text-input-custom" type="text" required data-value-missing="You have to provide a value for this text input field">
      </label>

    </form>
  </body>

</html>
