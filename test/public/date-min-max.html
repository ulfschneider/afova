<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta http-equiv="Cache-Control" content="no-store, max-age=0">
        <title>
        Test Date Min Max
    </title>
        <script defer src="/js/afova.js"></script>
        <script>
            addEventListener('DOMContentLoaded', () => afova.init());
        </script>
        <link rel="stylesheet" href="/css/main.css">
    </head>
    <style></style>

    <body>
        <a href="/">Home</a>
        <h1>Test Date Min Max
    </h1>
        <form>
            <input type="submit" value="Submit the form"/>

            <div class="afova-group">
                <label for="date-min-max">A date
                <div class="description">Please provide a date in the range within {{min}} and {{max}}</div>
                    <input id="date-min-max" type="date" min="2022-01-01" max="2022-12-31">
                </label>
            </div>

            <div class="afova-group">
                <label for="date-min-max-custom">A required date with custom failure message
                <div class="description">Please provide a date in the range within {{min}} and {{max}}</div>
                    <input id="date-min-max-custom"  type="date"
                    data-range-overflow="The value is too big. It cannot be above {{constraint}}." max="2022-12-31"
                    data-range-underflow="The value is too small. It cannot be below {{constraint}}." min="2022-01-01"                    
                    data-value-missing="It is required to provide this date" required>
                </label>
            </div>

        </form>
    </body>

</html>
